<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a56db">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="마이빌딩">
    <title>마이빌딩 — 부동산 현황 관리</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- 스타일시트 -->
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div id="app">
    <!-- TOP BAR -->
    <div id="topbar">
        <div class="logo">🏢 마이빌딩</div>
        <div id="search-wrap" style="position:relative;">
            <input id="search-input" type="text" placeholder="주소 또는 건물명 검색" autocomplete="off">
            <svg class="search-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <div id="search-results"></div>
        </div>
        <div id="topbar-actions">
            <button class="icon-btn" id="filter-btn" title="필터">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h18M6 12h12M10 19h4"/>
                </svg>
            </button>

            <button class="icon-btn" id="logout-btn" title="로그아웃" onclick="confirmLogout()">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
                </svg>
            </button>
        </div>
    </div>

    <!-- FILTER PANEL (필터 버튼에서 쑥 나오는 폼) -->
    <div id="filter-panel">
        <div class="filter-panel-title">필터</div>
        <div class="filter-chip active" data-filter="all">전체</div>
        <div class="filter-chip" data-filter="empty">공실</div>
        <div class="filter-chip" data-filter="occupied">임차중</div>
        <div class="filter-chip" data-filter="expiring">만기임박</div>
        <div class="filter-chip" data-filter="house">단독&다중</div>
        <div class="filter-chip" data-filter="multiplex">다세대</div>
        <div class="filter-chip" data-filter="officetel">오피스텔</div>
        <div class="filter-chip" data-filter="commercial">상가</div>
    </div>

    <!-- MAP AREA -->
    <div id="map-wrap">
        <div id="map"></div>

        <!-- Map picker UI -->
        <div id="map-picker-bar">📍 지도를 이동하거나 주소를 검색해 건물 위치를 설정하세요</div>
        <div id="map-picker-search">
            <input id="picker-search-input" type="text" placeholder="주소 검색 후 Enter — 그 위치로 이동" autocomplete="off">
            <div id="picker-search-results"></div>
        </div>
        <div id="map-picker-crosshair">
            <svg width="40" height="60" viewBox="0 0 40 60">
                <circle cx="20" cy="20" r="12" fill="#1a56db" opacity="0.9"/>
                <circle cx="20" cy="20" r="5" fill="white"/>
                <path d="M20 32 L20 50" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <button id="map-picker-confirm">✓ 이 위치로 설정</button>

        <!-- Floating controls -->
        <div class="map-float-controls">
            <button class="map-ctrl-btn" id="zoom-in-btn">+</button>
            <button class="map-ctrl-btn" id="zoom-out-btn">−</button>
            <button class="map-ctrl-btn" id="my-location-btn" title="내 위치">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
                    <path d="M12 8a4 4 0 100 8 4 4 0 000-8z"/>
                </svg>
            </button>
        </div>
        <button id="add-btn-float" title="건물 추가">+</button>
    </div>

    <!-- BOTTOM SHEET -->
    <div id="bottom-sheet">
        <div class="sheet-handle" id="sheet-handle"></div>
        <div class="sheet-header" id="sheet-header">
            <button class="sheet-close" id="sheet-close" onclick="closeSheet()">✕</button>
            <div class="sheet-title" id="sheet-title">내 건물 목록</div>
            <div class="sheet-subtitle" id="sheet-subtitle">지도에서 건물을 선택하거나 + 버튼으로 추가하세요</div>
        </div>
        <div class="sheet-body" id="sheet-body"></div>
    </div>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
        <button class="nav-tab active" data-tab="map" onclick="switchTab('map')">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6-10l6-3m0 13l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4"/>
            </svg>
            지도
        </button>
        <button class="nav-tab" data-tab="list" onclick="switchTab('list')">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
            목록
        </button>
        <button class="nav-tab" data-tab="stats" onclick="switchTab('stats')">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            현황
        </button>
        <button class="nav-tab" data-tab="settings" onclick="switchTab('settings')">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            설정
        </button>
    </nav>
</div>

<!-- MODAL -->
<div id="modal-overlay">
    <div id="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">건물 추가</span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- IMAGE VIEWER (이미지 확대 보기) -->
<div id="image-viewer" onclick="closeImageViewer()">
    <button id="image-viewer-close" onclick="closeImageViewer()" title="닫기">✕</button>
    <img id="image-viewer-img" src="" alt="확대 이미지">
</div>

<script src="config.js?v=1.0.0"></script>
<script src="main.js?v=1.0.0"></script>
<!-- 네이버맵 SDK 동적 로드 -->
<script>
    (function () {
        debugger;
        // config.js에서 네이버 맵 키를 가져옵니다.
        const key = (window.APP_CONFIG && window.APP_CONFIG.NAVER_MAP_CLIENT_ID);
        if (!key || key === 'YOUR_NAVER_MAP_CLIENT_ID') {
            if (typeof showMapFallback === 'function') showMapFallback();
            return;
        }
        var s = document.createElement('script');
        // 네이버 지도 API v3 URL 호출
        s.src = 'https://openapi.map.naver.com/openapi/v3/maps.js?submodules=geocoder&ncpKeyId=' + key;
        s.onload = function () {
            // 네이버 지도는 로드 완료 후 바로 initMap 호출 가능
            if (typeof initMap === 'function') initMap();
        };
        s.onerror = function () { if (typeof showMapFallback === 'function') showMapFallback(); };
        document.head.appendChild(s);
    })();
</script>
</body>
</html>
