<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="0.55" stop-color="#1a56db"/>
      <stop offset="1" stop-color="#1633a8"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0c1f52" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 배경 라운드 스퀘어 -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="280" rx="116" fill="url(#gloss)"/>

  <!-- 건물 카드 -->
  <g filter="url(#ds)">
    <rect x="150" y="116" width="212" height="306" rx="26" fill="#ffffff"/>
  </g>

  <!-- 방(창문) 점유 현황 그리드 3 x 4 -->
  <!-- 색: 임차(green #16a34a) · 만기(amber #f59e0b) · 공실(red #ef4444) · 기본(light #cdd9ef) -->
  <g>
    <!-- row 0 -->
    <rect x="176" y="150" width="40" height="40" rx="9" fill="#16a34a"/>
    <rect x="236" y="150" width="40" height="40" rx="9" fill="#cdd9ef"/>
    <rect x="296" y="150" width="40" height="40" rx="9" fill="#f59e0b"/>
    <!-- row 1 -->
    <rect x="176" y="208" width="40" height="40" rx="9" fill="#cdd9ef"/>
    <rect x="236" y="208" width="40" height="40" rx="9" fill="#16a34a"/>
    <rect x="296" y="208" width="40" height="40" rx="9" fill="#cdd9ef"/>
    <!-- row 2 -->
    <rect x="176" y="266" width="40" height="40" rx="9" fill="#ef4444"/>
    <rect x="236" y="266" width="40" height="40" rx="9" fill="#cdd9ef"/>
    <rect x="296" y="266" width="40" height="40" rx="9" fill="#16a34a"/>
    <!-- row 3 -->
    <rect x="176" y="324" width="40" height="40" rx="9" fill="#f59e0b"/>
    <rect x="236" y="324" width="40" height="40" rx="9" fill="#cdd9ef"/>
    <rect x="296" y="324" width="40" height="40" rx="9" fill="#16a34a"/>
  </g>

  <!-- 출입문 -->
  <path d="M236 422 v-30 a20 20 0 0 1 40 0 v30 z" fill="#1a56db"/>

  <!-- 확인 체크 배지 (노트/확인) -->
  <g filter="url(#ds)">
    <circle cx="372" cy="378" r="52" fill="#ffffff"/>
  </g>
  <circle cx="372" cy="378" r="52" fill="none" stroke="#e8f0fe" stroke-width="2"/>
  <path d="M350 379 l14 15 l30 -33" fill="none" stroke="#1a56db" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
